name: Build & Test

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (dockcross manylinux2014, glibc 2.17) ──
          - name: Linux x64
            os: ubuntu-latest
            container: dockcross/manylinux2014-x64:latest
            configure: cmake --preset debug
            build: cmake --build --preset debug
            test: ctest --preset debug

          # ── macOS ────────────────────────────────────────
          - name: macOS
            os: macos-latest
            configure: cmake --preset debug
            build: cmake --build --preset debug
            test: ctest --preset debug

          # ── Windows (MSVC) ───────────────────────────────
          - name: Windows MSVC
            os: windows-latest
            configure: cmake -B build -DCMAKE_BUILD_TYPE=Debug -Dtoolbox_BUILD_TESTS=ON
            build: cmake --build build --config Debug
            test: ctest --test-dir build --build-config Debug

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Test
        run: ${{ matrix.test }} --output-on-failure

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.name }}
          path: |
            build/**/CMakeFiles/CMakeOutput.log
            build/**/CMakeFiles/CMakeError.log
            build/**/Testing/**/*.xml
